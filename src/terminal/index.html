<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1e1e1e;
    }

    #terminal-container {
      width: 100%;
      height: 100%;
      padding: 8px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="terminal-container">
    <div class="loading">Initializing WebContainer...</div>
  </div>
  <script type="module" src="./terminal-ui.ts"></script>
</body>
</html>
